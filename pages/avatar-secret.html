  <script src="../assets/js/site-data.js"></script>
<script data-v73-theme-prepaint>
(function(){
  var fallback='light';
  try{var configured=window.SITE_DATA&&window.SITE_DATA.site&&window.SITE_DATA.site.defaultTheme; fallback=configured==='dark'?'dark':'light';}catch(e){}
  var theme=fallback;
  try{var sessionChoice=sessionStorage.getItem('zw-theme-session-v73'); if(sessionChoice==='dark'||sessionChoice==='light') theme=sessionChoice;}catch(e){}
  document.documentElement.setAttribute('data-theme',theme);
})();
</script>
  <script src="../assets/js/avatar-secret.js"></script>
</body>
