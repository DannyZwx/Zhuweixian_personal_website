<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../assets/css/style.css" />
<script src="../assets/js/site-data.js"></script>
<script data-v55-theme-prepaint>
(function(){
  var fallback='light';
  try{var configured=window.SITE_DATA&&window.SITE_DATA.site&&window.SITE_DATA.site.defaultTheme; fallback=configured==='dark'?'dark':'light';}catch(e){}
  var theme=fallback;
  try{theme=localStorage.getItem('zw-theme')||fallback;}catch(e){}
  if(theme!=='dark'&&theme!=='light') theme=fallback;
  document.documentElement.setAttribute('data-theme',theme);
})();
</script>
  <title>小游戏作品｜朱炜贤</title>
</head>
<body class="sub-page game-page" data-page="game">
  <audio id="bgm" data-audio="site.bgm" loop preload="auto"></audio>
  <div class="site-bg" aria-hidden="true"><i class="blob b1"></i><i class="blob b2"></i><i class="blob b3"></i><i class="noise"></i></div>
  <div class="cursor-glow" id="cursorGlow"></div>
  <header class="site-header" data-render="header"></header>
  <main>
    <section class="page-hero section-shell reveal-up" data-render="pageHero"></section>
    <section class="section-shell godot-help reveal-up">
      <h2>Godot 小游戏嵌入方法</h2>
      <p>在 Godot 中选择 Web 导出，把导出的整个文件夹放进 <code>website/assets/godot/你的游戏名/</code>。保证里面有 <code>index.html</code>，再在编辑器中填写 <code>assets/godot/你的游戏名/index.html</code>。</p>
    </section>
    <section class="section-shell" data-render="miniGames"></section>
  </main>
  <div data-render="modalRoot"></div>
  <button class="music-btn" id="musicBtn" type="button" aria-label="播放或暂停背景音乐"><span class="music-icon">♪</span><span class="music-text">BGM</span></button>
  <footer class="site-footer"><a href="../home.html?section=portfolio-entry">返回</a><a href="../home.html">返回</a></footer>
  <script src="../assets/js/main.js"></script>
</body>
</html>
